# Configuration file

general {
    # Toggles the playing of the welcome sound when you load the world.
    B:playWelcomeSound=true

    # Sends a welcome message in the chat to each player joining.
    B:sendWelcomeMessage=true
}


miscellaneous {
    # Enable Blood
    B:blood=true

    # Allow Floobship Explosion
    B:floobShipExplode=false

    # Allow Floobs to Target Villagers
    B:floobTargetVillagers=true

    # Allow Bum Public Urination
    B:publicUrination=true

    # Enable Raygun Fire
    B:rayGunFire=true

    # Enable Raygun Melt
    B:rayGunMelt=true
}


spawn {
    # This setting controls the overall spawn rate. The spawn rate of every mob is multiplied by this number. So 0.5 is the default rate, 1.0 is 2x the rate, 0.25 is half the rate, etc.
    D:globalSpawnRate=0.75

    # This a list of Non-Vanilla biomes that More Creeps mobs should spawn in.
    S:nonVanillaBiomes <
     >

    # Setting this to true will cause More Creeps mobs to spawn in biomes added by other mods.
    B:spawnInNonVanillaBiomes=false
}


