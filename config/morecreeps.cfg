worldgen {
    # Enable Castle Gen
    B:castleGen=true

    # Castle Rarity. Given as a percentage chance per chunk, so 0.1 = 0.1% chance per chunk.
    D:castleRarityChance=0.10000000149011612

    # Enable Jail
    B:jailActive=true

    # Enable Pyramid Gen
    B:pyramidGen=true

    # Pyramid Rarity. Given as a percentage chance per chunk, so 1 = 1% chance per Desert chunk.
    D:pyramidRarityChance=1.0
}


